name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check

  build:
    name: Build (${{ matrix.os }})
    needs: format
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac
          - os: ubuntu-latest
            script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Sync version from tag
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$ver';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Download yt-dlp (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"

      - name: Download yt-dlp (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          curl -fsSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" -o bin/yt-dlp
          chmod +x bin/yt-dlp

      - name: Generate icon.icns (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32 32 assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 64 64 assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/icon.png --out icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns
          rm -rf icon.iconset

      - name: Build
        run: npm run ${{ matrix.script }} -- --publish never
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          retention-days: 7

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-all
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-all/**/*
          generate_release_notes: true
